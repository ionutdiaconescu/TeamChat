<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./chat.css" />
    <script type="module" src="./chat.ts"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <title>TeamChat</title>
  </head>
  <body>
    <div class="page chat-layout m-xs flex gap-sm">
      <button
        class="open-close-friendList"
        type="button"
        aria-label="Show friends list"
        aria-expanded="false"
      ></button>

      <!-- Sidebar friends -->
      <aside class="sidebar flex flex-column">
        <div class="sidebar-title flex flex-center">Friends</div>
        <!-- Search friends -->
        <div class="friend-search">
          <div class="search-input-wrapper">
            <input
              type="text"
              class="friend-search-input"
              placeholder="Search friends..."
            />
            <img
              class="search-icon"
              src="../../../public/search-icon.webp"
              alt=""
            />
          </div>
        </div>

        <!-- Friends list -->
        <ul class="friend-list flex flex-column"></ul>
      </aside>
      <!-- Chat zone -->
      <main class="chat-window flex flex-column">
        <div class="chat-header">
          <div class="chat-user-info">
            <img
              class="avatar chat-avatar avatar-online"
              src="../../../public/user-icon.webp"
              alt="User avatar"
            />
            <div class="chat-window-title">
              <span id="chatUserName" class="user-name"></span>
              <span id="chatUserEmail" class="user-email"></span>
            </div>
          </div>
        </div>
        <!-- Chat messages -->
        <div class="flex flex-column flex-grow gap-xs chat-messages"></div>

        <!-- Emoji container -->
        <div class="emoji-selector" id="emojiSelector">
          <div class="input-container">
            <div class="search-emoji">
              <input type="text" name="" id="" placeholder="Search..." />
            </div>
          </div>
          <ul id="emojiList" class="emoji-list"></ul>
        </div>
        <!-- Send message bar -->
        <div class="message-send-bar">
          <div class="message-send-bar-inner">
            <div class="input-with-emoji">
              <button
                id="emojiSelectorIcon"
                class="emoji-selector-icon"
                type="button"
                aria-label="Open emoji picker"
              >
                <ion-icon class="emoji-glyph" name="happy-outline"></ion-icon>
              </button>

              <button
                id="attachmentMenuButton"
                class="attachment-menu-button"
                type="button"
                aria-label="Open attachment options"
                aria-expanded="false"
              >
                <ion-icon name="add-outline"></ion-icon>
              </button>

              <div
                id="attachmentMenu"
                class="attachment-menu"
                aria-hidden="true"
              >
                <button
                  id="attachImageOption"
                  type="button"
                  class="attachment-menu-option attachment-image-option"
                  aria-label="Attach image"
                  title="Image"
                >
                  <ion-icon name="image-outline"></ion-icon>
                </button>
                <button
                  id="attachDocumentOption"
                  type="button"
                  class="attachment-menu-option attachment-document-option"
                  aria-label="Attach document"
                  title="Document"
                >
                  <ion-icon name="document-attach-outline"></ion-icon>
                </button>
              </div>

              <input
                type="file"
                id="imageInput"
                accept="image/*"
                class="image-input-hidden"
              />
              <input
                type="file"
                id="documentInput"
                accept=".pdf,.doc,.docx,.txt,.csv,.xlsx,.xls,.ppt,.pptx"
                class="image-input-hidden"
              />
              <div class="textarea-container">
                <textarea
                  id="messageInput"
                  class="message-input flex-grow"
                  placeholder="Write a message..."
                  rows="1"
                ></textarea>
              </div>
            </div>
            <button
              id="audioRecordBtn"
              class="flex flex-center audio-record-btn"
              type="button"
              aria-label="Start audio recording"
            >
              <ion-icon name="mic-outline"></ion-icon>
            </button>
            <button
              id="sendMessageBtn"
              class="flex flex-center send-button"
              type="button"
            >
              <img
                class="send-icon"
                src="../../../public/send-icon.webp"
                alt="send-icon"
              />
            </button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
