<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./chat.css" />
    <script type="module" src="./chat.ts"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <title>TeamChat</title>
  </head>
  <body>
    <div class="page chat-layout m-xs flex gap-sm">
      <!-- Sidebar friends -->
      <aside class="sidebar flex flex-column">
        <button class="open-close-friendList"></button>
        <div class="sidebar-title flex flex-center">Friends</div>
        <!-- Search friends -->
        <div class="friend-search">
          <div class="search-input-wrapper">
            <input
              type="text"
              class="friend-search-input"
              placeholder="Search friends..."
            />
            <img
              class="search-icon"
              src="../../../public/search-icon.webp"
              alt=""
            />
          </div>
        </div>

        <!-- Friends list -->
        <ul class="friend-list flex flex-column"></ul>
      </aside>
      <!-- Chat zone -->
      <main class="chat-window flex flex-column">
        <div class="chat-header">
          <div class="chat-user-info">
            <img
              class="avatar chat-avatar avatar-online"
              src="../../../public/user-icon.webp"
              alt="User avatar"
            />
            <div class="chat-window-title">
              <span id="chatUserName" class="user-name"></span>
              <span id="chatUserEmail" class="user-email"></span>
            </div>
          </div>
        </div>
        <!-- Chat messages -->
        <div class="flex flex-column flex-grow gap-xs chat-messages"></div>

        <!-- Emoji container -->
        <li class="emoji-selector" id="emojiSelector">
          <div class="input-container">
            <div class="search-emoji">
              <input type="text" name="" id="" placeholder="Search..." />
            </div>
          </div>
          <ul id="emojiList" class="emoji-list"></ul>
        </li>
        <!-- Send message bar -->
        <div class="message-send-bar">
          <div class="message-send-bar-inner">
            <div class="input-with-emoji">
              <span id="emojiSelectorIcon" class="emoji-selector-icon">
                <ion-icon
                  class="emoji-selector-icon"
                  name="happy-outline"
                ></ion-icon>
              </span>
              <input
                type="file"
                id="imageInput"
                accept="image/*"
                class="image-input-hidden"
              />
              <span id="imageUploadIcon" class="image-upload-icon">
                <ion-icon name="image-outline"></ion-icon>
              </span>
              <div class="textarea-container">
                <textarea
                  id="messageInput"
                  class="message-input flex-grow"
                  placeholder="Write a message..."
                  rows="1"
                ></textarea>
              </div>
            </div>
            <button id="sendMessageBtn" class="flex flex-center send-button">
              <img
                class="send-icon"
                src="../../../public/send-icon.webp"
                alt="send-icon"
              />
            </button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
