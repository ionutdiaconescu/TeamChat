<!DOCTYPE html>

      </div>
      <div class="contact-card">
        <div class="contact-icon email">
          <img src="/public/gmail-icon.webp" alt="yahoo-icon" />
        </div>
        <div>
          <div class="label">Email</div>
          <a
            href="mailto:diaconescuionut95@gmail.com"
            target="_blank"
            class="contact-link"
            >diaconescuionut95@gmail.com</a

          <img src="/public/linkedin-icon.webp" alt="" />

            href="https://www.linkedin.com/in/ionut-diaconescu-id/"

          href="https://wa.me/40731846797"

          href="mailto:diaconescuionut95@gmail.com"

          ><img src="/public/gmail-icon.webp" alt="email"
        /></a>
        <a
          href="https://www.linkedin.com/in/ionut-diaconescu-id/"
          target="_blank"
          class="social-btn linkedIn"
          title="Visit linkedIn profile"

        /></a>
